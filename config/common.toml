[code_organization]
extract_shared_logic = true            # 共通処理は専用モジュールに切り出す
no_inline_duplication = true           # 同一ロジックの複数箇所へのコピペ禁止
review_folder_structure = true         # フォルダ構成は常に見直し、意味論的に整合させる
no_root_dumping = true                 # ルートディレクトリに何でも置く構成を禁止
magic_numbers_in_toml = true          # マジックナンバーは config/magic_numbers.toml で一元管理
cli_defaults_in_toml = true           # CLIオプションのデフォルト値は config/cli_defaults.toml で一元管理

[paths]
no_hardcoded_paths = true              # 絶対パスのハードコード禁止（py/go/rs対象）

[style]
self_documenting = true                # 自己文書化されたコードを書く
comments_intent_only = true            # コメントは意図の説明のみ追加する

[testing]
tdd = true                              # レッド → グリーン → リファクタリング
structure = "arrange-act-assert"        # テストは Arrange-Act-Assert 構造にする

[typing]
strict = true                           # 強い型付けを徹底する
no_any = true                           # Any 型の使用を禁止
explicit_annotations = true             # 関数や属性に明示的な型アノテーションを付ける

[dependencies]
upper_bound_required = true             # バージョン上限の指定を必須にする

[lockfile]
commit_to_repo = true                   # lockfileはリポジトリにコミットする
install_without_lock = false            # lockfileなしのインストールを禁止

[cache]
hash_based_invalidation = true        # キャッシュは対象ファイルのハッシュ値を保存し、変更時に破棄する
